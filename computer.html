<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My computer</title>
    <link rel="stylesheet" href="assets/styles/computer.css">
</head>
<body>
   
    <div class="pc-container">
        <main class="screen">
            <div class="icons">
                <a href="https://steamcommunity.com/profiles/76561198838271478/" target="_blank" rel="external">
                    <div class="icon">
                        <img src="assets/computerassets/steam.png" alt="steamicon">
                        <p>Steam</p>
                    </div>
                </a>
                <a href="https://open.spotify.com/user/yr1ax0fkeomf60xht7mnea1og?si=69b9b4a234944014" target="_blank" rel="external">
                    <div class="icon">
                        <img src="assets/computerassets/spotify.png" alt="spotifyicon">
                        <p>Spotify</p>
                    </div>
                </a>
                 <a href="https://github.com/gabypaim" target="_blank" rel="external">
                    <div class="icon">
                        <img src="assets/computerassets/github.ong.png" alt="githubicon">
                        <p>Github</p>
                    </div>
                </a>
                  <a href="https://x.com/Gabypaiim" target="_blank" rel="external">
                    <div class="icon">
                        <img src="assets/computerassets/twitter.png" alt="twittericon">
                        <p>Twitter</p>
                    </div>
                </a>
            </div>
            <div class="col2">
                <div class="icon" onclick="pcwindow()">
                    <img src="assets/computerassets/mypc.png" alt="meucomputadoricon" id="mypc">
                    <p>my computer</p>
                </div>
            </div>
            <div class="janelas">
                <div class="windowpc" id="win-mypc">
                    <div class="topo">
                        <span>my computer</span>
                        <button class="fechar" onclick="windowclose()">x</button>
                    </div>
                    <nav>
                        <p>config</p>
                        <p>setup</p>
                    </nav>
                </div>
        </div>
        </main>
        <div class="barra">
            <div id="winxp">
                <img src="assets/computerassets/xp.png" alt="">
                <p>start;</p>
            </div>
            <div class="dia">
                <p id="hora">dd/mm/yy</p>
                <p id="dia">dd/mm/yy</p>
            </div>
        </div>


        <img src="assets/computerassets/computerwhite.png" alt="" class="pc-frame">
    </div>
   
    <script src="assets/scripts/computer.js"></script>
</body>
</html>
